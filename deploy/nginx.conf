# =====================================================
# NGINX CONFIGURATION
# AfterHoursID - Production Reliability
# =====================================================

# Worker configuration
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request ID
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_request_id" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # =====================================================
    # GZIP COMPRESSION
    # =====================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json 
               application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;
    gzip_disable "msie6";

    # Brotli compression (if available)
    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript;

    # =====================================================
    # RATE LIMITING
    # =====================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # =====================================================
    # CACHE CONTROL
    # =====================================================
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Static assets cache
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:100m 
                     max_size=1g inactive=7d use_temp_path=off;

    # =====================================================
    # UPSTREAM (Next.js)
    # =====================================================
    upstream nextjs {
        least_conn;
        server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s backup;
        keepalive 32;
    }

    # =====================================================
    # SECURITY HEADERS
    # =====================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.afterhours.id wss://*.afterhours.id;" always;

    # =====================================================
    # WAF RULES (Basic)
    # =====================================================
    # Block common SQL injection patterns
    if ($query_string ~ "union.*select.*from") {
        return 403;
    }
    if ($query_string ~ "union.*all.*select") {
        return 403;
    }
    if ($query_string ~ "concat.*\(.*select") {
        return 403;
    }

    # Block common XSS patterns
    if ($query_string ~ "<script") {
        return 403;
    }
    if ($query_string ~ "javascript:") {
        return 403;
    }

    # =====================================================
    # SERVER BLOCKS
    # =====================================================
    server {
        listen 80;
        listen [::]:80;
        server_name afterhours.id www.afterhours.id;

        # Redirect HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name afterhours.id www.afterhours.id;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/afterhours.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/afterhours.id/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # Connection limits
        limit_conn conn_limit 50;
        limit_req zone=api_limit burst=50 nodelay;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Metrics endpoint (restricted)
        location /metrics {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://nextjs/metrics;
        }

        # Static files
        location /_next/static {
            proxy_cache static_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            add_header Cache-Control "public, max-age=31536000, immutable";
            proxy_pass http://nextjs;
        }

        # Public assets
        location /public {
            proxy_cache static_cache;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
            proxy_pass http://nextjs;
        }

        # API routes
        location /api {
            limit_req zone=api_limit burst=100 nodelay;
            
            # Add request ID for tracing
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Auth routes (stricter rate limiting)
        location /api/auth {
            limit_req zone=auth_limit burst=20 nodelay;
            
            proxy_set_header X-Request-ID $request_id;
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
        }

        # Search routes
        location /api/v1/venues {
            limit_req zone=search_limit burst=30 nodelay;
            
            proxy_set_header X-Request-ID $request_id;
            proxy_pass http://nextjs;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Default - Next.js pages
        location / {
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
